<!DOCTYPE html>
<html>
<head>
<title>Secure Checkout | Partha Premium Grocery</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:0;
}

.container{
max-width:550px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.header{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
text-align:center;
color:gray;
margin-bottom:25px;
}

label{
font-weight:600;
display:block;
margin-top:15px;
}

input, textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

textarea{
height:80px;
}

.total{
background:#f8f8f8;
padding:15px;
border-radius:10px;
margin-top:20px;
text-align:center;
font-size:20px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
font-size:18px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
Secure Checkout
</div>

<div class="sub">
Enter your delivery details
</div>
<form method="POST" action="{% url 'place_order' %}">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" required>

<label>Phone</label>
<input type="text" name="phone" required>

<label>Address</label>
<textarea name="address" required></textarea>

<label>Pincode</label>
<input type="text" name="pincode" required>

<h3>Select Payment Method</h3>

<input type="radio" name="payment_method" value="razorpay" required> Pay Online
<br><br>
<input type="radio" name="payment_method" value="cod"> Cash On Delivery

<input type="hidden" name="amount" value="{{ total }}">

<button type="submit">Place Order</button>

</form>
</div>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>

window.onload = function(){

let total = localStorage.getItem("total_amount");

if(!total){
total = 0;
}

document.getElementById("total").innerText = total;
document.getElementById("amount").value = total;

}


</script>
<form method="POST" action="{% url 'place_order' %}">
{% csrf_token %}

<label>Name</label>
<input type="text" name="name" required>

<label>Phone</label>
<input type="text" name="phone" required>

<label>Address</label>
<textarea name="address" required></textarea>

<label>Pincode</label>
<input type="text" name="pincode" required>

<h3>Select Payment Method</h3>

<input type="radio" name="payment_method" value="razorpay" required>
Pay Online (Razorpay)

<br><br>

<input type="radio" name="payment_method" value="cod">
Cash On Delivery

<input type="hidden" name="amount" id="amount">

<button type="submit">Place Order</button>

</form>

<script>
let total = localStorage.getItem("total_amount");
document.getElementById("amount").value = total;
</script>

</body>
</html>
